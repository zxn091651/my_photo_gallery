<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zxn's Photo Gallery</title>
    <link rel="stylesheet" href="./styles.css?v=20260704-33" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="图库状态">
        <div>
          <h1>zxn's Photo Gallery</h1>
          <p id="statusText" class="connection-status is-bad">
            <span class="status-dot" aria-hidden="true"></span>
            <span>后端连接状态</span>
          </p>
        </div>
      </section>

      <section class="workspace">
        <section class="content" aria-label="媒体内容">
          <div class="content-header">
            <div>
              <h2 id="currentFolder">请选择文件夹</h2>
              <p id="mediaCount">等待加载照片和视频</p>
            </div>
            <div class="header-actions">
              <button id="rootButton" type="button">返回</button>
            </div>
          </div>
          <div id="mediaGrid" class="media-grid"></div>
        </section>
      </section>
    </main>

    <dialog id="viewerDialog" class="viewer">
      <div class="viewer-toolbar">
        <strong id="viewerTitle"></strong>
        <div>
          <a id="downloadLink" class="button-link" download>下载</a>
          <button id="closeViewerButton" type="button">关闭</button>
        </div>
      </div>
      <div id="viewerStage" class="viewer-stage"></div>
    </dialog>

    <dialog id="uploadDialog" class="upload-dialog">
      <form id="uploadForm" method="dialog">
        <div class="dialog-header">
          <strong>上传照片/视频</strong>
          <button id="closeUploadButton" type="button">关闭</button>
        </div>
        <label>
          <span>目标文件夹</span>
          <select id="uploadFolderSelect" name="folder"></select>
        </label>
        <label>
          <span>新建文件夹</span>
          <input id="newFolderInput" name="newFolder" type="text" autocomplete="off" placeholder="可留空" />
        </label>
        <label>
          <span>上传密码</span>
          <input id="uploadPasswordInput" name="password" type="password" autocomplete="off" required />
        </label>
        <label>
          <span>选择文件</span>
          <input id="uploadFilesInput" name="files" type="file" multiple accept="image/*,video/*" required />
        </label>
        <div id="uploadProgress" class="upload-progress" hidden>
          <div class="upload-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span id="uploadProgressBar"></span>
          </div>
          <span id="uploadProgressText">0%</span>
        </div>
        <p id="uploadStatus" class="upload-status"></p>
        <button id="submitUploadButton" class="primary-control" type="submit">开始上传</button>
      </form>
    </dialog>

    <script src="./config.js?v=20260704-33"></script>
    <script type="module" src="./app.js?v=20260704-33"></script>
  </body>
</html>
