<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zxn's Photo Gallery</title>
    <link rel="stylesheet" href="./styles.css?v=20260704-7" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="图库状态">
        <div>
          <h1>zxn's Photo Gallery</h1>
          <p id="statusText" class="connection-status is-bad">
            <span class="status-dot" aria-hidden="true"></span>
            <span>后端连接状态</span>
          </p>
        </div>
      </section>

      <section class="workspace">
        <section class="content" aria-label="媒体内容">
          <div class="content-header">
            <div>
              <h2 id="currentFolder">请选择文件夹</h2>
              <p id="mediaCount">等待加载照片和视频</p>
            </div>
            <button id="rootButton" type="button">根目录</button>
          </div>
          <div id="mediaGrid" class="media-grid"></div>
        </section>
      </section>
    </main>

    <dialog id="viewerDialog" class="viewer">
      <div class="viewer-toolbar">
        <strong id="viewerTitle"></strong>
        <div>
          <a id="downloadLink" class="button-link" download>下载</a>
          <button id="closeViewerButton" type="button">关闭</button>
        </div>
      </div>
      <div id="viewerStage" class="viewer-stage"></div>
    </dialog>

    <script src="./config.js?v=20260704-7"></script>
    <script type="module" src="./app.js?v=20260704-7"></script>
  </body>
</html>
